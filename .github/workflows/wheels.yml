name: native-wheels

# Builds the optional native engine (visiter_native) as abi3 wheels across
# platforms. On a `native-v*` tag it publishes them to PyPI so that
# `pip install "visiter[native]"` resolves a prebuilt wheel — no local
# toolchain needed. On push/PR it just builds, to catch breakage early.
#
# One-time PyPI setup for publishing: configure trusted publishing for the
# `visiter_native` project (PyPI → project → Publishing) with owner `yaccob`,
# repo `visiter`, workflow `wheels.yml`, no environment. Or swap the publish
# step for a token.

on:
  push:
    branches: [main]
    tags: ["native-v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wheels:
    name: wheel ${{ matrix.platform.target }} (${{ matrix.platform.runner }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-latest,  target: x86_64 }
          - { runner: ubuntu-latest,  target: aarch64 }
          - { runner: macos-13,       target: x86_64 }
          - { runner: macos-latest,   target: aarch64 }
          - { runner: windows-latest, target: x64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: native
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          manylinux: auto
          sccache: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.runner }}-${{ matrix.platform.target }}
          path: native/dist/*.whl

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: native
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: native/dist/*.tar.gz

  publish:
    name: publish to PyPI
    if: startsWith(github.ref, 'refs/tags/native-v')
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # trusted publishing (no token secret needed)
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
